<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alterar status da solicitação</title>
    <script type="module" crossorigin src="/assets/alterar-Bq_ZcsXZ.js"></script>
    <link rel="modulepreload" crossorigin href="/assets/style-DfhkZpD_.js">
    <link rel="modulepreload" crossorigin href="/assets/api-B7Ex-E8g.js">
    <link rel="stylesheet" crossorigin href="/assets/style-BEVEDAzm.css">
  </head>
  <body class="app-page">
    <main class="app-shell">
      <h2>Alterar status da solicitação</h2>
      <p class="app-subtitle">
        Informe o código da solicitação e atualize os campos desejados.
      </p>

      <section class="cadastro-container" aria-label="Formulário de alteração">
        <p>
          <label for="inpCod">Código:</label>
          <input
            id="inpCod"
            type="text"
            placeholder="Digite o código da solicitação"
          />
        </p>
        <p>
          <label for="inpNome">Nome:</label>
          <input id="inpNome" type="text" placeholder="Nome do solicitante" />
        </p>
        <p>
          <label for="inpBairro">Bairro:</label>
          <input id="inpBairro" type="text" placeholder="Bairro" />
        </p>
        <p>
          <label for="inpServico">Serviço:</label>
          <select id="inpServico">
            <option value="Iluminação Pública">Iluminação Pública</option>
            <option value="Tapa Buraco / Asfalto">Tapa Buraco / Asfalto</option>
            <option value="Coleta de Lixo / Entulho">
              Coleta de Lixo / Entulho
            </option>
            <option value="Vazamento de Água/Esgoto">
              Vazamento de Água/Esgoto
            </option>
            <option value="Poda de Árvores">Poda de Árvores</option>
            <option value="Outros">Outros</option>
          </select>
        </p>
        <p>
          <label for="inpDescricao">Descrição:</label>
          <textarea
            id="inpDescricao"
            rows="4"
            placeholder="Descrição da solicitação"
          ></textarea>
        </p>
        <p>
          <label for="inpStatus">Status:</label>
          <select id="inpStatus"></select>
        </p>

        <div class="form-actions split-actions">
          <button id="btnAlterar" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M15.67 3.3a2.25 2.25 0 0 1 3.18 3.18l-8.9 8.9a1 1 0 0 1-.46.26l-3.2.8a1 1 0 0 1-1.21-1.21l.8-3.2a1 1 0 0 1 .26-.46l8.9-8.9ZM14.26 4.7 6.94 12.03l-.45 1.8 1.8-.45 7.32-7.32-1.35-1.35Zm2.77 0 1.35 1.35.06-.06a.25.25 0 0 0 0-.35l-1-1a.25.25 0 0 0-.35 0l-.06.06ZM5 6a3 3 0 0 1 3-3h3a1 1 0 1 1 0 2H8a1 1 0 0 0-1 1v10a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1v-3a1 1 0 1 1 2 0v3a3 3 0 0 1-3 3H8a3 3 0 0 1-3-3V6Z"
              />
            </svg>
            <span>Alterar</span>
          </button>
          <button id="btnVoltar" type="button">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M10.53 5.47a1 1 0 0 1 0 1.41L6.41 11H20a1 1 0 1 1 0 2H6.41l4.12 4.12a1 1 0 0 1-1.41 1.41l-5.83-5.83a1 1 0 0 1 0-1.41l5.83-5.82a1 1 0 0 1 1.41 0Z"
              />
            </svg>
            <span>Voltar</span>
          </button>
        </div>
      </section>
    </main>
  </body>
</html>
