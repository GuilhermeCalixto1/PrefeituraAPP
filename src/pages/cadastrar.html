<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastrar Solicitação - Prefeitura</title>
    <link rel="stylesheet" href="/src/styles/style.css" />
  </head>
  <body>
    <div class="container">
      <header>
        <h1>Nova Solicitação</h1>
        <nav>
          <a href="/index.html">Voltar ao Início</a>
          <a href="/src/pages/consultar.html">Ver Solicitações</a>
        </nav>
      </header>

      <main>
        <form id="form-cadastrar">
          <div class="form-group">
            <label for="nome">Nome do Solicitante:</label>
            <input
              type="text"
              id="nome"
              name="nome"
              placeholder="Digite seu nome completo"
              required
            />
          </div>

          <div class="form-group">
            <label for="bairro">Bairro:</label>
            <input
              type="text"
              id="bairro"
              name="bairro"
              placeholder="Digite o nome do seu bairro"
              required
            />
          </div>

          <div class="form-group">
            <label for="servico">Tipo de Serviço:</label>
            <select id="servico" name="servico" required>
              <option value="" disabled selected>
                Selecione um serviço...
              </option>
              <option value="Iluminação Pública">Iluminação Pública</option>
              <option value="Tapa Buraco / Asfalto">
                Tapa Buraco / Asfalto
              </option>
              <option value="Coleta de Lixo">Coleta de Lixo / Entulho</option>
              <option value="Vazamento de Água/Esgoto">
                Vazamento de Água/Esgoto
              </option>
              <option value="Poda de Árvores">Poda de Árvores</option>
              <option value="Outros">Outros</option>
            </select>
          </div>

          <div class="form-group">
            <label for="descricao">Descrição do Problema:</label>
            <textarea
              id="descricao"
              name="descricao"
              rows="4"
              placeholder="Descreva o problema com detalhes..."
              required
            ></textarea>
          </div>

          <button type="submit" class="btn-submit">
            Cadastrar Solicitação
          </button>
        </form>
      </main>
    </div>

    <script type="module" src="/src/scripts/cadastrar.js"></script>
  </body>
</html>
